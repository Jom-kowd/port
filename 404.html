<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .error-page-container {
            height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            background: var(--primary-gradient);
            
            /* Standard property first (fixes the warning) */
            background-clip: text;
            
            /* Vendor prefix for compatibility */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            /* Standard fallback to make text invisible so background shows through */
            color: transparent;
            
            line-height: 1;
            margin-bottom: 1rem;
        }
        .error-desc {
            max-width: 500px;
            margin: 0 auto 2rem;
            color: var(--secondary-color);
        }
    </style>
</head>
<body>
    <main class="container error-page-container">
        <div class="error-code">404</div>
        <h1>Page Not Found</h1>
        <p class="error-desc">Oops! The page you are looking for has vanished into the digital void.</p>
        
        <a href="index.html" class="btn btn-primary">
            <i class="fa-solid fa-house"></i> Return Home
        </a>
    </main>

    <script src="js/theme-toggle.js"></script>
</body>
</html>
